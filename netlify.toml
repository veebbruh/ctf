# Netlify build config for Geminathon-CTF (Vite SPA)
[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

# Allow VITE_* keys in build output (Supabase anon key & Firebase keys are public-by-design for client-side use)
# SUPABASE_SERVICE_ROLE_KEY is server-only (used by netlify/functions for timer start/reset)
[build.environment]
  SECRETS_SCAN_OMIT_KEYS = "VITE_FIREBASE_API_KEY,VITE_FIREBASE_APP_ID,VITE_FIREBASE_AUTH_DOMAIN,VITE_FIREBASE_MEASUREMENT_ID,VITE_FIREBASE_MESSAGING_SENDER_ID,VITE_FIREBASE_PROJECT_ID,VITE_FIREBASE_STORAGE_BUCKET,VITE_SUPABASE_ANON_KEY,VITE_SUPABASE_URL,SUPABASE_SERVICE_ROLE_KEY"

# Required for team login & leaderboard: set in Netlify UI → Site configuration → Environment variables
#   VITE_SUPABASE_URL = your Supabase project URL (e.g. https://xxxx.supabase.co)
#   VITE_SUPABASE_ANON_KEY = your Supabase anon/public key
# The build script writes these into .env before Vite runs so they are inlined. Redeploy after adding/changing variables.
